version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campus_connect}
      POSTGRES_USER: ${POSTGRES_USER:-campus_connect}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    networks:
      - campus_overlay
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  api:
    image: ${API_IMAGE:-campus_connect_api:latest}
    environment:
      LISTEN_ADDR: ":8080"
      DATABASE_URL_FILE: /run/secrets/database_url
    ports:
      - target: 8080
        published: ${API_PUBLISHED_PORT:-8080}
        protocol: tcp
        mode: ingress
    secrets:
      - database_url
    networks:
      - campus_overlay
    deploy:
      mode: replicated
      replicas: ${API_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s

secrets:
  postgres_password:
    external: true
  database_url:
    external: true

volumes:
  postgres_data:

networks:
  campus_overlay:
    driver: overlay
