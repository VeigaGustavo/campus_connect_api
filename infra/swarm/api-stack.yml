version: "3.9"

services:
  api:
    image: ${API_IMAGE:-campus_connect_api:latest}
    environment:
      LISTEN_ADDR: ":8080"
      DATABASE_URL_FILE: /run/secrets/database_url
      GIN_MODE: release
    ports:
      - target: 8080
        published: ${API_PUBLISHED_PORT:-8080}
        protocol: tcp
        mode: ingress
    secrets:
      - database_url
    networks:
      - campus_overlay
    deploy:
      mode: replicated
      replicas: ${API_REPLICAS:-1}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          cpus: "${API_CPU_LIMIT:-1.0}"
          memory: ${API_MEM_LIMIT:-256M}
        reservations:
          cpus: "${API_CPU_RESERVE:-0.25}"
          memory: ${API_MEM_RESERVE:-64M}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

secrets:
  database_url:
    external: true

networks:
  campus_overlay:
    external: true
    name: campus_overlay_shared
